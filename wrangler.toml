name = "image-bg-remover"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

# REMOVE_BG_API_KEY is set as a secret in Cloudflare Pages Dashboard

# D1 Database binding (created via: wrangler d1 create bg-remover-db)
[[d1_databases]]
binding = "DB"
database_name = "bg-remover-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"
